<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StructureRAG Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white border-b px-6 py-4 flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">S
        </div>
        <h1 class="text-xl font-semibold text-gray-900">StructureRAG Demo</h1>
        <span class="ml-auto text-xs text-gray-400">Structure-Aware RAG + Runtime Confidence Scoring</span>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">

        <!-- Section 1: Upload -->
        <section class="bg-white rounded-xl border p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">1. Upload Document</h2>
            <div id="dropzone"
                class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-indigo-400 transition-colors"
                onclick="document.getElementById('fileInput').click()">
                <p class="text-gray-500">Drop a PDF here or <span class="text-indigo-600 font-medium">browse</span></p>
                <p class="text-xs text-gray-400 mt-1">Contracts, financial reports, technical specs — anything with
                    tables</p>
            </div>
            <input type="file" id="fileInput" accept=".pdf" class="hidden" onchange="handleFileSelect(event)" />
            <div id="uploadStatus" class="mt-3 text-sm text-gray-600 hidden"></div>
        </section>

        <!-- Section 2: Query -->
        <section class="bg-white rounded-xl border p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">2. Ask a Question</h2>
            <div class="flex gap-3">
                <input id="questionInput" type="text" placeholder="e.g. What was the total revenue in Q3?"
                    class="flex-1 border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    onkeydown="if(event.key==='Enter') runQuery()" />
                <button onclick="runQuery()"
                    class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors disabled:opacity-50"
                    id="queryBtn">
                    Compare Pipelines
                </button>
            </div>
            <!-- Sample questions -->
            <div class="mt-3 flex flex-wrap gap-2">
                <span class="text-xs text-gray-400">Try:</span>
                <button onclick="setQ(this)"
                    class="text-xs bg-gray-100 hover:bg-indigo-50 text-gray-600 px-2 py-1 rounded-full transition-colors">What
                    was the total revenue in Q3?</button>
                <button onclick="setQ(this)"
                    class="text-xs bg-gray-100 hover:bg-indigo-50 text-gray-600 px-2 py-1 rounded-full transition-colors">Under
                    what conditions can the contract be terminated early?</button>
                <button onclick="setQ(this)"
                    class="text-xs bg-gray-100 hover:bg-indigo-50 text-gray-600 px-2 py-1 rounded-full transition-colors">What
                    is the maximum liability cap?</button>
                <button onclick="setQ(this)"
                    class="text-xs bg-gray-100 hover:bg-indigo-50 text-gray-600 px-2 py-1 rounded-full transition-colors">Which
                    sections reference the payment schedule?</button>
                <button onclick="setQ(this)"
                    class="text-xs bg-gray-100 hover:bg-indigo-50 text-gray-600 px-2 py-1 rounded-full transition-colors">Summarize
                    the key financial obligations</button>
            </div>
            <div id="queryStatus" class="mt-3 text-sm text-indigo-600 hidden">
                Running both pipelines and scoring confidence...
            </div>
        </section>

        <!-- Section 3: Results -->
        <section id="resultsSection" class="hidden">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">3. Pipeline Comparison</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div id="flatCol"></div>
                <div id="structCol"></div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
